    <!-- Preloader Script -->
    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.body.classList.add("loaded");
            }, 3100);
        });
    </script>

    <!-- Detection Button Script -->
    <script>
        document.getElementById("detectBtn").addEventListener("click", function () {
            const btn = this;
            const spinner = document.getElementById("loadingSpinner");
            const form = btn.closest("form");
            const textarea = document.getElementById("exampleFormControlTextarea1");
            const errorBox = document.getElementById("errorBox");

            errorBox.innerText = "";

            if (textarea.value.trim() === "") {
                const errorMsg = "🚫 Please enter your email message, only then the analysis can be performed.";
                errorBox.innerText = errorMsg;



                const errorVoice = new SpeechSynthesisUtterance(errorMsg);
                errorVoice.lang = "hi-IN";
                window.speechSynthesis.speak(errorVoice);
                return;
            }

            btn.innerText = "Detecting now...";
            btn.disabled = true;
            btn.style.cursor = "wait";
            btn.style.backgroundColor = "#fff";
            btn.style.color = "#000";



            spinner.classList.remove("d-none");

            const msg = new SpeechSynthesisUtterance("Please wait! AI is analyzing your message.");
            msg.lang = "hi-IN";
            window.speechSynthesis.speak(msg);

            setTimeout(() => {
                btn.innerText = "Detect Message";
                btn.disabled = false;
                btn.style.cursor = "pointer";
                btn.style.background = "#fff";
                btn.style.color = "#000"
                spinner.classList.add("d-none");
                form.submit();
            }, 2500);
        });
    </script>

    <!-- JavaScript to show AI icon on typing -->
    <script>
        const textarea = document.getElementById('exampleFormControlTextarea1');
        const aiIcon = document.getElementById('ai-icon');

        let typingTimer;
        textarea.addEventListener('input', () => {
            aiIcon.classList.remove('hidden');

            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                aiIcon.classList.add('hidden');
            }, 2000); // icon hides after 2s of inactivity
        });
    </script>

    <!-- Fullscreen Toggle -->
    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    alert(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('✅ Service Worker registered'))
                .catch(error => console.error('❌ Service Worker registration failed:', error));
        }
    </script>
